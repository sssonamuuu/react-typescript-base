# 所有配置都分为 .common .local .dev .pro 不同环境
# 基本配置在 所有环境相同配置放在 .common ，不同环境配置不一致的通过.env区分

[configure.common]
a = 2

[configure.local]
a = 1

[configure.dev]
a = 3

# 一下配置如果是 antd 变量，会修改antd主题
# 如果不是，则仅为自定义变量
# 两种变量都可以在 less 中 通过 @variable-name 使用
# 同样，也可以在tsx?中通过 globalConfig.theme[variable-name] 使用
# https://github.com/ant-design/ant-design/blob/master/components/style/themes/default.less
[theme.common]
primary-color = '#1890ff'
label-color = '#6E7F9C'